name: Daily AQI Retraining

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

jobs:
  retrain:
    runs-on: ubuntu-latest

    env:
      SHEET_ID: ${{ secrets.SHEET_ID }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      JSONBIN_API_KEY: ${{ secrets.JSONBIN_API_KEY }}
      JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}
      LOG_BIN_ID: ${{ secrets.LOG_BIN_ID }}

      DAGSHUB_REPO_OWNER: ${{ secrets.DAGSHUB_REPO_OWNER }}
      DAGSHUB_REPO_NAME: ${{ secrets.DAGSHUB_REPO_NAME }}
      DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}

      GIT_PYTHON_REFRESH: quiet

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug DagsHub env
        run: |
          python -c "import os; print('OWNER:', os.getenv('DAGSHUB_REPO_OWNER')); print('REPO:', os.getenv('DAGSHUB_REPO_NAME')); print('TOKEN EXISTS:', os.getenv('DAGSHUB_USER_TOKEN') is not None)"

      - name: Test DagsHub token
        run: |
          python -c "import os, requests; owner=os.getenv('DAGSHUB_REPO_OWNER'); repo=os.getenv('DAGSHUB_REPO_NAME'); token=os.getenv('DAGSHUB_USER_TOKEN'); r=requests.get(f'https://dagshub.com/api/v1/repos/{owner}/{repo}', headers={'Authorization': f'token {token}'}); print('status:', r.status_code); print(r.text[:200])"

      - name: Build features
        run: python src/build_features.py

      - name: Retrain model
        run: python src/retrain.py

      - name: Evaluate model
        run: python src/evaluate.py
